services:
  yhys-calendar:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: yhys-calendar-dev
    ports:
      - "5173:5173"
    volumes:
      # 挂载源代码实现热更新
      - ..:/app
      # 使用匿名卷保持容器内的 node_modules，避免被宿主机覆盖
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Vite/Chokidar 文件监听配置
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

