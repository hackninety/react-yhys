version: '3.8'

services:
  # Application Service
  yhys-calendar:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: yhys-calendar
    restart: always # Robust restart policy for production
    ports:
      # Expose API port
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=${DB_USER:-yhys_user}
      - DB_PASSWORD=${DB_PASSWORD:-CHANGE_ME_USER_PASSWORD}
      - DB_NAME=${DB_NAME:-yhys_calendar}
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Database Service
  db:
    image: mysql:5.7
    container_name: yhys-mysql
    restart: always
    ports:
      # Only expose if necessary, otherwise keep internal or bind to localhost
      - "${DB_PORT:-3306}:3306"
    environment:
      # ⚠️ CHANGE THESE VALUES IN PRODUCTION ⚠️
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-CHANGE_ME_SECURE_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-yhys_calendar}
      MYSQL_USER: ${DB_USER:-yhys_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_USER_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    platform: linux/amd64
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_prod_data:
